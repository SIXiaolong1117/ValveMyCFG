hud_fastswitch "1"  // 快速切换武器

alias +knife "slot3"
alias -knife "lastinv"
bind "mouse5" "+knife"

bind "MWHEELUP" "+duck"
bind "MWHEELDOWN" "+jump"
bind "SPACE" "+jump"
bind "mouse4" "+voicerecord"

// ========== 准星设置 ==========
crosshair "1"
cl_crosshair_color "0 255 0"
cl_crosshair_size "small"
cl_crosshair_translucent "0"
cl_dynamiccrosshair "0"

