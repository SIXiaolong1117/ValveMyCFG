bind "p" "demo_pause"
bind "o" "demo_resume"
bind "[" "demo_goto -10"
bind "]" "demo_goto +10"
bind "1" "demo_timescale 0.25"
bind "2" "demo_timescale 1"
bind "3" "demo_timescale 5"
bind "h" "toggle cl_drawhud 0 1"
bind "space" "demo_togglepause"
bind "f" "spec_mode 6"
bind "mouse5" "spec_next"
bind "mouse4" "spec_prev"

echo "Counter-Strike 2 Demo configuration is ready!"