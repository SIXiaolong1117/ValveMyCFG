// ========== 基础设置 ==========
con_enable "1"                  // 开启控制台
cl_showpos "0"                  // 不显示位置
cl_radar_always_centered "0"    // 雷达更大范围 不以玩家为中心
fps_max "300"

// ========== 按键设置 ==========
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3;+lookatweapon;-lookatweapon"
bind "4" "slot4"
bind "5" "slot5"
bind "9" "slot9"
bind "a" "+left"
bind "b" "buymenu"
bind "d" "+right"
bind "e" "+use"
bind "f" "+lookatweapon"
bind "g" "drop"
bind "h" "switchhands"
bind "m" "teammenu"
bind "n" "+radialradio"
bind "q" "lastinv"
bind "r" "+reload"
bind "s" "+back"
bind "t" "+spray_menu"
bind "u" "messagemode2"
bind "w" "+forward"
bind "y" "messagemode"
bind "=" "toggleconsole"
bind "ENTER" "ent_fire script Enter"
bind "BACKSPACE" "ent_fire script Backspace"
bind "TAB" "+score"
bind "ESCAPE" "cancelselect"
bind "DEL" "ent_fire script Delete"
bind "SHIFT" "+sprint"
bind "CTRL" "+duck"
bind "F3" "autobuy"
bind "F4" "rebuy"
bind "F6" "save quick"
bind "F7" "load quick"
bind "F10" "cs_quit_prompt"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE3" "player_ping"
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
// 自定义按键
alias +switchw "slot3"      // 按下切刀
alias -switchw "lastinv"    // 松开切上一把武器
bind "MOUSE5" "+switchw"    
bind "MWHEELUP" "+jump"     // 滚轮跳
bind "MWHEELDOWN" "+jump"   // 滚轮跳
bind "z" "slot10"   // 火
bind "x" "slot6"    // 雷
bind "c" "slot8"    // 烟
bind "v" "slot7"    // 闪
bind "MOUSE4" "+voicerecord"    // Mouse4 开启语音（按住说话）
bind "F1" "clutch_mode_toggle"  // F1 暂时禁止聊天
bind "=" "toggleconsole"        // = 打开控制台
bind "n" "+radialradio"         // N 打开快捷聊天轮盘1
bind "ALT" "toggleradarscale"   // ALT 缩放小地图
bind "UPARROW" "invprev"        // 上方向切换上一把武器
bind "DOWNARROW" "invnext"      // 下方向切换下一把武器
bind "'" "say_team .drop"   // 5e发刀

// ========== 准星设置 ==========
cl_crosshair_drawoutline "true"
cl_crosshair_friendly_warning "1"
cl_crosshair_dynamic_maxdist_splitratio "1.000000"
cl_crosshair_dynamic_splitalpha_innermod "0.000000"
cl_crosshair_dynamic_splitalpha_outermod "1.000000"
cl_crosshair_dynamic_splitdist "0"
cl_crosshair_outlinethickness "1.000000"
cl_crosshair_recoil "false"
cl_crosshair_sniper_width "1"
cl_crosshair_t "false"
cl_crosshairalpha "192"
cl_crosshaircolor "5"
cl_crosshaircolor_b "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "0"
cl_crosshairdot "true"
cl_crosshairgap "-5.000000"
cl_crosshairgap_useweaponvalue "true"
cl_crosshairsize "5.000000"
cl_crosshairstyle "2"
cl_crosshairthickness "0.500000"
cl_crosshairusealpha "true"



