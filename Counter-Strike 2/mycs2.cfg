unbindall   // 取消所有绑定
echo "====================================="
echo "= All binds were unset and re-bind. ="
echo "====================================="

// ========== 基础设置 ==========
// 客户端设置
con_enable "1"                  // 开启控制台
cl_showpos "0"                  // 不显示位置
cl_radar_always_centered "0"    // 雷达更大范围 不以玩家为中心
fps_max "0"                     // 游戏内最大FPS 0表示无限制
fps_max_ui "60"                 // 大厅内最大FPS 0表示无限制
r_fullscreen_gamma "2.2"        // 伽马值
rate "1000000"                  // 主机每秒可以接收数据的最小字节数 1000000为CS2上限 取决于上传带宽
cl_interp "0.015625"            // 以时间形式读取有效的客户端模拟插值量 0.015625是64tick下1tick的时间
cl_interp_ratio "1"             // 比例 cl_interp = cl_interp_ratio / cl_updaterate，cl_updaterate默认64且无法修改
sensitivity "0.625"             // eDPI=DPI*sensitivity CS2似乎默认开启鼠标原始输入且无法关闭
zoom_sensitivity_ratio "1"      // 开镜灵敏度倍数       
hud_scaling "1"                 // HUD大小
cl_hud_radar_scale "1"          // 雷达UI大小
cl_radar_rotate "1"             // 开启雷达旋转
cl_radar_scale "0.35"           // 雷达比例 有效值为 0.25 至 1.0
cl_radar_scale_alternate "1"    // 备用雷达比例 有效值为 0.25 至 1.0
cl_radar_scale_dynamic "0"      // 关闭动态雷达
cl_radar_always_centered "0"    // 玩家在雷达不居中
cl_radar_square_with_scoreboard "1" // 按TAB切换方形雷达
cl_radar_icon_scale_min "0.5"   // 雷达中间小圆点的大小
r_drawtracers_firstperson "1"   // 开启曳光弹

// 音频设置
// 注意：音频的数值是非线性的，实际音量大小以设置页面为准
volume "1"                              // 主音量
snd_menumusic_volume "0.01"             // 主菜单音乐音量
snd_roundstart_volume "0"               // 回合开始音量
snd_roundaction_volume "0"              // 回合开始行动音量
snd_roundend_volume "0"                 // 回合结束音量
snd_mvp_volume "0.04"                   // MVP音量
snd_mapobjective_volume "0.04"          // 炸弹/人质音量
snd_tensecondwarning_volume "0.04"      // 十秒警告音量
snd_deathcamera_volume "0.0"            // 死亡视角音量
snd_mute_mvp_music_live_players "1"     // 双方队伍均存活时关闭MVP音乐
snd_mute_losefocus "1"                  // 后台播放声音=0，后台静音=1
voice_modenable "1"                     // 启用语音

// ========== 按键设置 ==========
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3;+lookatweapon;-lookatweapon"
bind "4" "slot4"
bind "5" "slot5"
bind "9" "slot9"
bind "a" "+left"
bind "b" "buymenu"
bind "d" "+right"
bind "e" "+use"
bind "g" "drop"
bind "n" "+radialradio"
bind "q" "lastinv"
bind "r" "+reload"
bind "s" "+back"
bind "t" "+spray_menu"
bind "u" "messagemode2"
bind "w" "+forward"
bind "y" "messagemode"
bind "=" "toggleconsole"
bind "ENTER" "ent_fire script Enter"
bind "BACKSPACE" "ent_fire script Backspace"
bind "TAB" "+showscores"
bind "ESCAPE" "cancelselect"
bind "DEL" "ent_fire script Delete"
bind "SHIFT" "+sprint"
bind "CTRL" "+duck"
bind "F3" "autobuy"
bind "F4" "rebuy"
bind "F6" "save quick"
bind "F7" "load quick"
bind "F10" "cs_quit_prompt"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE3" "player_ping"
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
// 自定义按键
alias +switchw "slot3"      // 按下切刀
alias -switchw "lastinv"    // 松开切上一把武器
bind "MOUSE5" "+switchw"    
alias +quickdrop "slot5"
alias -quickdrop "drop"
bind "H" "+quickdrop"
bind "MWHEELDOWN" "+jump"   // 滚轮跳
bind "z" "slot10"   // 火
bind "x" "slot6"    // 雷
bind "c" "slot8"    // 烟
bind "f" "slot7"    // 闪
bind "MOUSE4" "+voicerecord"    // Mouse4 开启语音（按住说话）
bind "F5" "clutch_mode_toggle"  // F1 暂时禁止聊天
bind "=" "toggleconsole"        // = 打开控制台
bind "ALT" "toggleradarscale"   // ALT 缩放小地图
bind "UPARROW" "invprev"        // 上方向切换上一把武器
bind "DOWNARROW" "invnext"      // 下方向切换下一把武器
bind "'" "say_team .drop"   // 5e发刀
bind "SPACE" "+jump"
bind "-" "teammenu"
bind "M" "+radialradio"         // 快捷聊天轮盘1
bind "V" "+duck"
bind "I" "+lookatweapon"

// ========== 准星设置 ==========
cl_crosshair_drawoutline "true"
cl_crosshair_friendly_warning "1"
cl_crosshair_dynamic_maxdist_splitratio "1.000000"
cl_crosshair_dynamic_splitalpha_innermod "0.000000"
cl_crosshair_dynamic_splitalpha_outermod "1.000000"
cl_crosshair_dynamic_splitdist "0"
cl_crosshair_outlinethickness "1.000000"
cl_crosshair_recoil "false"
cl_crosshair_sniper_width "1"
cl_crosshair_t "false"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshaircolor_b "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "0"
cl_crosshairdot "true"
cl_crosshairgap "3.000000"
cl_crosshairgap_useweaponvalue "true"
cl_crosshairsize "4.000000"
cl_crosshairstyle "2"
cl_crosshairthickness "0.100000"
cl_crosshairusealpha "true"

